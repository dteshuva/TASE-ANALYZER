# Render Blueprint for the backend API.
# In Render: New + → "Blueprint" → pick the dteshuva/TASE-ANALYZER repo.
# Secrets (sync: false) are entered in the Render dashboard, never committed.
#
# Free plan spins the service down after ~15min idle; the first request after
# that pays a ~50s cold-start, which the frontend's fetch times out on and
# shows as a generic failure. A free external monitor (e.g. cron-job.org or
# UptimeRobot) pinging healthCheckPath every ~10min keeps it warm.
services:
  - type: web
    name: tase-analyzer-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5
      # Set these in the dashboard (kept out of git):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      # Comma-separated; set to your Vercel frontend URL after step 2,
      # e.g. https://tase-analyzer.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
